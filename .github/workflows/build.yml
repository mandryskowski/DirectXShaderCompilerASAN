name: Build DXC

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build-windows:
    name: "Windows Native Build (${{ matrix.build_type }}, Sanitizers: ${{ matrix.sanitizers }})"
    runs-on: windows-2022
    strategy:
      fail-fast: false
      matrix:
        build_type: [Release, Debug]
        sanitizers: [asan-ubsan, none]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive 

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install/Upgrade Dependencies
        run: |
          choco upgrade ninja -y
          choco upgrade llvm -y

      - name: Add LLVM to PATH
        shell: pwsh
        run: echo "C:\Program Files\LLVM\bin" >> $env:GITHUB_PATH

      - name: Setup MSVC Developer Command Prompt
        uses: ilammy/msvc-dev-cmd@v1

      - name: Setup Sanitizer Environment
        if: matrix.sanitizers == 'asan-ubsan'
        shell: pwsh
        run: |
          $resource_dir = $(clang-cl --print-resource-dir).Trim()
          $sanitizer_lib_dir = Join-Path $resource_dir "lib\windows"
          
          if (Test-Path $sanitizer_lib_dir) {
            Write-Host "Found Clang Sanitizer libs at: $sanitizer_lib_dir"
            
            $fso = New-Object -ComObject Scripting.FileSystemObject
            $short_path = $fso.GetFolder($sanitizer_lib_dir).ShortPath
            $cmake_lib_dir = $short_path -replace '\\', '/'
            
            echo "ASAN_LIB_DIR=$cmake_lib_dir" >> $env:GITHUB_ENV
            echo "ASAN_DLL_DIR=$sanitizer_lib_dir" >> $env:GITHUB_ENV
            echo "$sanitizer_lib_dir" >> $env:GITHUB_PATH
          } else {
            Write-Error "Could not find Clang Sanitizer libs at $sanitizer_lib_dir!"
            exit 1
          }

      - name: Configure CMake (Sanitized)
        if: matrix.sanitizers == 'asan-ubsan'
        run: |
          cmake -B build --fresh `
            -C cmake/caches/PredefinedParams.cmake `
            -G Ninja `
            -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} `
            -DCMAKE_C_COMPILER=clang-cl `
            -DCMAKE_CXX_COMPILER=clang-cl `
            -DLLVM_ENABLE_WERROR=OFF `
            -DSPIRV_WERROR=OFF `
            -DCMAKE_POLICY_DEFAULT_CMP0091=NEW `
            -DCMAKE_MSVC_RUNTIME_LIBRARY="MultiThreadedDLL" `
            -DCMAKE_C_FLAGS="/w -fsanitize=address -fsanitize=undefined -fsanitize-recover=undefined /Z7" `
            -DCMAKE_CXX_FLAGS="/w -fsanitize=address -fsanitize=undefined -fsanitize-recover=undefined /Z7" `
            -DCMAKE_C_FLAGS_RELEASE="/O2 /MD /DNDEBUG" `
            -DCMAKE_CXX_FLAGS_RELEASE="/O2 /MD /DNDEBUG" `
            -DCMAKE_C_FLAGS_DEBUG="/Od /MD" `
            -DCMAKE_CXX_FLAGS_DEBUG="/Od /MD" `
            -DCMAKE_EXE_LINKER_FLAGS="/DEBUG /libpath:${{ env.ASAN_LIB_DIR }} clang_rt.asan_dynamic-x86_64.lib clang_rt.asan_dynamic_runtime_thunk-x86_64.lib /nodefaultlib:clang_rt.ubsan_standalone-x86_64.lib /nodefaultlib:clang_rt.ubsan_standalone_cxx-x86_64.lib" `
            -DCMAKE_SHARED_LINKER_FLAGS="/DEBUG /libpath:${{ env.ASAN_LIB_DIR }} clang_rt.asan_dynamic-x86_64.lib clang_rt.asan_dynamic_runtime_thunk-x86_64.lib /nodefaultlib:clang_rt.ubsan_standalone-x86_64.lib /nodefaultlib:clang_rt.ubsan_standalone_cxx-x86_64.lib" `
            -DLLVM_PARALLEL_LINK_JOBS=1

      - name: Configure CMake (No Sanitizers)
        if: matrix.sanitizers == 'none'
        run: |
          cmake -B build --fresh `
            -C cmake/caches/PredefinedParams.cmake `
            -G Ninja `
            -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} `
            -DCMAKE_C_COMPILER=clang-cl `
            -DCMAKE_CXX_COMPILER=clang-cl `
            -DLLVM_ENABLE_WERROR=OFF `
            -DSPIRV_WERROR=OFF `
            -DCMAKE_POLICY_DEFAULT_CMP0091=NEW `
            -DCMAKE_MSVC_RUNTIME_LIBRARY="MultiThreadedDLL" `
            -DCMAKE_C_FLAGS="/w /Z7" `
            -DCMAKE_CXX_FLAGS="/w /Z7" `
            -DCMAKE_C_FLAGS_RELEASE="/O2 /MD /DNDEBUG" `
            -DCMAKE_CXX_FLAGS_RELEASE="/O2 /MD /DNDEBUG" `
            -DCMAKE_C_FLAGS_DEBUG="/Od /MD" `
            -DCMAKE_CXX_FLAGS_DEBUG="/Od /MD" `
            -DCMAKE_EXE_LINKER_FLAGS="/DEBUG" `
            -DCMAKE_SHARED_LINKER_FLAGS="/DEBUG" `
            -DLLVM_PARALLEL_LINK_JOBS=1

      - name: Build DXCompiler and DXC
        env:
          ASAN_OPTIONS: "detect_leaks=0"
          UBSAN_OPTIONS: "halt_on_error=0"
        run: cmake --build build --config ${{ matrix.build_type }} --target dxcompiler --target dxc --parallel 2

      - name: Download Official DXIL.dll
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          Write-Host "Fetching latest DXC release from GitHub to extract dxil.dll..."
          $headers = @{ Authorization = "Bearer $env:GITHUB_TOKEN" }
          $release = Invoke-RestMethod -Uri "https://api.github.com/repos/microsoft/DirectXShaderCompiler/releases/latest" -Headers $headers
          $asset = $release.assets | Where-Object { $_.name -match "dxc_.*\.zip" } | Select-Object -First 1
          
          if ($asset) {
            Invoke-WebRequest -Uri $asset.browser_download_url -OutFile "dxc_latest.zip"
            Expand-Archive -Path "dxc_latest.zip" -DestinationPath "dxc_latest" -Force
            Copy-Item -Path "dxc_latest\bin\x64\dxil.dll" -Destination "build\bin\" -Force
          } else {
            Write-Error "Could not find the DXC release zip!"
            exit 1
          }

      - name: Bundle LLVM ASan DLL
        if: matrix.sanitizers == 'asan-ubsan'
        shell: pwsh
        run: |
          Copy-Item -Path "$env:ASAN_DLL_DIR\clang_rt.asan_dynamic-x86_64.dll" -Destination "build\bin\" -Force

      - name: Upload DXC Artifacts (Sanitized)
        if: matrix.sanitizers == 'asan-ubsan'
        uses: actions/upload-artifact@v4
        with:
          name: dxcompiler-sanitized-${{ matrix.build_type }}
          path: |
            build/bin/dxcompiler.dll
            build/bin/dxc.exe
            build/bin/*.pdb
            build/bin/dxil.dll
            build/bin/clang_rt.asan_dynamic-x86_64.dll
          if-no-files-found: error

      - name: Upload DXC Artifacts (No Sanitizers)
        if: matrix.sanitizers == 'none'
        uses: actions/upload-artifact@v4
        with:
          name: dxcompiler-${{ matrix.build_type }}
          path: |
            build/bin/dxcompiler.dll
            build/bin/dxc.exe
            build/bin/*.pdb
            build/bin/dxil.dll
          if-no-files-found: error

  release:
    name: Create Release
    needs: build-windows
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Zip artifacts
        run: |
          cd artifacts
          for dir in */; do
            cd "$dir"
            zip -r "../../${dir%/}.zip" .
            cd ..
          done
          cd ..

      - name: Publish Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_id }}
          name: "Build (${{ github.sha }})"
          files: ./*.zip
          draft: false
          prerelease: false
